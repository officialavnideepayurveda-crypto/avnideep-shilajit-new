<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Detail — Avnideep Admin</title>
<link rel="stylesheet" href="/css/styles.css">
    <script src="/js/api.js"></script>
<script src="/js/mobile-menu.js"></script>

<style>
@media (max-width: 640px) {
  .detail-grid { grid-template-columns: 1fr; gap: 8px; }
  .detail-grid .detail-item { padding: 8px 0; }
  .detail-grid .label { font-size: 11px; }
  .detail-grid .value { font-size: 14px; }
  #statusSelect { font-size: 16px; min-height: 44px; width: 100%; }
}
</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avnideep Admin">
<link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2>Avnideep</h2>
      <small>Admin Panel</small>
    </div>
    <div class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="rewards.html"><span class="icon">🏆</span><span>Rewards</span></a>
      <a href="orders.html"><span class="icon">📋</span><span>Orders</span></a>
      <a href="analytics.html"><span class="icon">📈</span><span>Analytics</span></a>
      <a href="payment-settings.html"><span class="icon">💳</span><span>Payment</span></a>
      <a href="seo.html"><span class="icon">🔍</span><span>SEO</span></a>
    </div>
        <div class="logout-btn">
      <button onclick="handleLogout()">🚪 Logout</button>
    </div>
  </nav>

  <!-- Sidebar Overlay for Mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
        <div>
          <h1>Order Details</h1>
          <p id="orderIdDisplay"></p>
        </div>
      </div>
      <a href="orders.html" class="btn btn-secondary">← Back to Orders</a>
    </div>

    <div id="orderContent">
      <div class="loading" id="loadingOrder"><div class="spinner"></div> Loading order...</div>
    </div>
  </main>
</div>

<script>

window.handleLogout = logout;

async function loadOrder() {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  if (!orderId) {
    document.getElementById('orderContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><h3>No order ID provided</h3></div>';
    return;
  }

  document.getElementById('orderIdDisplay').textContent = 'Order: ' + orderId;

  try {
    const order = await getOrderDetail(orderId);

    var loadingEl=document.getElementById('loadingOrder');if(loadingEl)loadingEl.style.display='none';

    const statusLabels = { pending: '⏳ Pending', confirmed: '✅ Confirmed', processing: '🔄 Processing', shipped: '📦 Shipped', out_for_delivery: '🚚 Out for Delivery', delivered: '🎉 Delivered', cancelled: '❌ Cancelled', returned: '↩️ Returned' };
    const payLabels = { prepaid: 'PREPAID', cod: 'COD', cod_whatsapp: 'COD (WhatsApp)' };
    const payMethods = { prepaid: 'Prepaid Online', cod: 'Cash on Delivery', cod_whatsapp: 'COD (WhatsApp Fallback)' };
    const normalizedStatus = (String(order.status || '').toLowerCase().trim() === 'paid' || String(order.payment_status || '').toLowerCase().trim() === 'paid' || String(order.payment_status || '').toLowerCase().trim() === 'captured') ? 'confirmed' : (['confirmed','shipped','delivered','completed','complete','success'].includes(String(order.status || '').toLowerCase().trim()) ? String(order.status || '').toLowerCase().trim() : (['cod_order','pending','payment_pending','processing','new','created'].includes(String(order.status || '').toLowerCase().trim()) ? 'pending' : 'pending'));
    const paymentStatus = String(order.payment_status || '').toLowerCase();
    const paymentBadgeClass = paymentStatus === 'paid' || paymentStatus === 'captured' ? 'confirmed' : paymentStatus === 'failed' ? 'cancelled' : 'pending';
    const paymentBadgeText = paymentStatus === 'paid' || paymentStatus === 'captured' ? 'PAID' : paymentStatus === 'failed' ? 'FAILED' : paymentStatus === 'refunded' ? 'REFUNDED' : 'PENDING';

    const date = order.created_at ? new Date(order.created_at).toLocaleString('en-IN', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';

    document.getElementById('orderContent').innerHTML = '\
      <div class="card" style="margin-bottom:20px">\
        <div class="card-header">\
          <h3>📄 Order Information</h3>\
          <span class="status status-' + normalizedStatus + '" style="font-size:13px;padding:5px 14px">' + (statusLabels[normalizedStatus] || normalizedStatus.toUpperCase()) + '</span>\
        </div>\
        <div class="detail-grid">\
          <div>\
            <div class="detail-field"><label>Order ID</label><div class="value" style="font-family:monospace;font-size:12px">' + (order.order_id || '—') + '</div></div>\
            <div class="detail-field"><label>Customer Name</label><div class="value">' + (order.name || '—') + '</div></div>\
            <div class="detail-field"><label>Phone Number</label><div class="value">' + (order.phone || '—') + '</div></div>\
            <div class="detail-field"><label>Email</label><div class="value">' + (order.email || '—') + '</div></div>\
          </div>\
          <div>\
            <div class="detail-field"><label>Payment Status</label><div class="value"><span class="status status-' + paymentBadgeClass + '">' + paymentBadgeText + ' · ' + (payLabels[order.payment_method] || order.payment_method || '—') + '</span></div></div>\
            <div class="detail-field"><label>Amount</label><div class="value" style="font-size:20px;font-weight:700">₹' + (order.amount || 0).toLocaleString('en-IN') + '</div></div>\
            <div class="detail-field"><label>Created At</label><div class="value" style="font-size:13px;color:var(--text2)">' + date + '</div></div>\
            <div class="detail-field"><label>Landing Page</label><div class="value" style="font-size:13px">' + (order.landing_page || 'main') + '</div></div>\
          </div>\
        </div>\
        <div class="detail-field"><label>Order Notes / Address</label><div class="value">' + (order.address || order.notes || '—') + '</div></div>\
      </div>\
      <div class="card" style="margin-bottom:20px">\
        <div class="card-header"><h3>🔄 Update Status</h3></div>\
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">\
          <select class="form-control" id="statusSelect" style="width:auto;min-width:180px">\
            <option value="pending" ' + (order.status === 'pending' ? 'selected' : '') + '>⏳ Pending</option>\
            <option value="confirmed" ' + (order.status === 'confirmed' ? 'selected' : '') + '>✅ Confirmed</option>\
            <option value="processing" ' + (order.status === 'processing' ? 'selected' : '') + '>🔄 Processing</option>\
            <option value="shipped" ' + (order.status === 'shipped' ? 'selected' : '') + '>📦 Shipped</option>\
            <option value="out_for_delivery" ' + (order.status === 'out_for_delivery' ? 'selected' : '') + '>🚚 Out for Delivery</option>\
            <option value="delivered" ' + (order.status === 'delivered' ? 'selected' : '') + '>🎉 Delivered</option>\
            <option value="cancelled" ' + (order.status === 'cancelled' ? 'selected' : '') + '>❌ Cancelled</option>\
            <option value="returned" ' + (order.status === 'returned' ? 'selected' : '') + '>↩️ Returned</option>\
          </select>\
          <button class="btn btn-primary" onclick="updateStatus(this)">Update Status</button>\
        </div>\
        <div id="statusMsg" style="margin-top:10px"></div>\
      </div>\
      <div class="card">\
        <div class="card-header"><h3>📊 Additional Details</h3></div>\
        <div class="detail-grid">\
          <div><div class="detail-field"><label>Source</label><div class="value">' + (order.source || '—') + '</div></div></div>\
          <div><div class="detail-field"><label>City</label><div class="value">' + (order.city || '—') + '</div></div></div>\
          <div><div class="detail-field"><label>Reward ID</label><div class="value">' + (order.reward_id || '—') + '</div></div></div>\
          <div><div class="detail-field"><label>Reward Amount</label><div class="value">₹' + (order.reward_amount || 0) + '</div></div></div>\
          <div><div class="detail-field"><label>UTR (Prepaid)</label><div class="value" style="font-family:monospace">' + (order.utr || '—') + '</div></div></div>\
          <div><div class="detail-field"><label>UTM Source</label><div class="value" style="font-size:12px">' + (order.utm_source || '—') + '</div></div></div>\
        </div>\
      </div>';

  } catch(e) {
    document.getElementById('orderContent').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Failed to load order</h3><p>' + e.message + '</p></div>';
  }
}

window.updateStatus = async function(btn) {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  const statusSelect = document.getElementById('statusSelect');
  const status = statusSelect.value;
  if (!orderId) { alert('No order ID found'); return; }
  
  // Optimistic UI: disable button, show spinner
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = '⏳ Updating...';
  
  // Get current status badge to show optimistic update
  const statusBadge = document.querySelector('.status-badge') || document.querySelector('[class*="status-"]');
  
  try {
    const result = await updateOrderStatus(orderId, status);
    btn.textContent = '✅ Updated!';
    
    // Signal dashboard to refresh when user navigates back
    localStorage.setItem('dashboard_needs_refresh', 'true');
    
    // Reload order details to get fresh data
    await loadOrder();
    
    // Show success message
    const msgEl = document.getElementById('statusMsg');
    if (msgEl) {
      msgEl.innerHTML = '<div class="alert alert-success" style="padding:8px 12px;border-radius:6px;background:rgba(16,185,129,0.15);color:#10b981;font-size:13px">✅ Status updated to ' + status.toUpperCase() + '</div>';
      setTimeout(function() { msgEl.innerHTML = ''; }, 3000);
    }
  } catch(e) {
    btn.textContent = '❌ Failed';
    alert('Failed to update status: ' + e.message);
    
    const msgEl = document.getElementById('statusMsg');
    if (msgEl) {
      msgEl.innerHTML = '<div class="alert alert-danger" style="padding:8px 12px;border-radius:6px;background:rgba(239,68,68,0.15);color:#ef4444;font-size:13px">❌ Error: ' + e.message + '</div>';
    }
  } finally {
    setTimeout(function() {
      btn.textContent = 'Update Status';
      btn.disabled = false;
    }, 2000);
  }
};

window.loadOrder = loadOrder;

// Init
const token = localStorage.getItem('admin_token');
if (!token) { window.location.href = '/index.html'; } else { loadOrder(); }
</script>

<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/service-worker.js').then(function(reg) {
      console.log('SW registered: ' + reg.scope);
    }).catch(function(err) {
      console.log('SW registration failed: ' + err);
    });
  });
}
</script>
</body>
</html>
